<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Control Center v4.0 - Admin Only</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --p: #6366f1; --s: #a855f7; --t: #ec4899;
            --bg: #030712; --card: #111827; --text: #f9fafb;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; padding-bottom: 100px; line-height: 1.6;
            background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
        }

        /* --- Layout --- */
        .container { width: 100%; max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; padding-top: 20px; }
        h1 { font-weight: 800; font-size: 28px; margin: 0; letter-spacing: -1px; background: linear-gradient(to right, #6366f1, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- Sections --- */
        .section { display: none; animation: fadeIn 0.4s ease-out; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- Glass Cards --- */
        .card {
            background: var(--card); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        /* --- Admin Forms --- */
        .form-label { display: block; font-size: 13px; font-weight: 600; color: #9ca3af; margin-bottom: 8px; margin-left: 5px; }
        .input-pill {
            width: 100%; background: #1f2937; border: 2px solid transparent;
            padding: 14px 20px; border-radius: 16px; color: white; font-size: 16px;
            transition: 0.3s; margin-bottom: 15px;
        }
        .input-pill:focus { border-color: var(--p); outline: none; background: #111827; }

        .btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 14px; border-radius: 16px; border: none;
            font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.3s;
        }
        .btn-p { background: var(--p); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3); }
        .btn-p:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4); }

        /* --- Quick List (Admin Panel) --- */
        .admin-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px; background: rgba(255,255,255,0.03);
            border-radius: 20px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05);
        }
        .user-meta h4 { margin: 0; font-size: 16px; }
        .user-meta small { color: #6b7280; }

        .action-btns { display: flex; gap: 8px; }
        .act-btn {
            width: 42px; height: 42px; border-radius: 12px; border: none;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: 0.2s;
        }
        .btn-plus { background: #10b981; color: white; }
        .btn-minus { background: #ef4444; color: white; }
        .act-btn:active { transform: scale(0.9); }

        /* --- Leaderboard Tabs --- */
        .tabs { display: flex; gap: 5px; background: #1f2937; padding: 5px; border-radius: 14px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1; padding: 10px; border-radius: 10px; border: none;
            background: transparent; color: #9ca3af; font-weight: 600; cursor: pointer;
        }
        .tab-btn.active { background: var(--p); color: white; }

        /* --- Rankings --- */
        .rank-row {
            display: flex; align-items: center; padding: 12px;
            background: #111827; border-radius: 16px; margin-bottom: 8px;
        }
        .rank-num { width: 35px; font-weight: 800; font-size: 18px; color: #4b5563; }
        .rank-name { flex: 1; font-weight: 600; }
        .rank-val { font-family: monospace; font-weight: 800; color: var(--p); background: rgba(99,102,241,0.1); padding: 4px 10px; border-radius: 8px; }

        /* --- Bottom Nav --- */
        .nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(17, 24, 39, 0.85);
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px; padding: 12px; display: flex; justify-content: space-around; z-index: 1000;
        }
        .nav-link { color: #6b7280; font-size: 20px; transition: 0.3s; cursor: pointer; }
        .nav-link.active { color: var(--p); transform: translateY(-5px); }

        /* --- Library --- */
        .book-pill { background: #1f2937; padding: 15px; border-radius: 18px; display: flex; gap: 15px; align-items: center; }
        .book-pill i { font-size: 24px; color: var(--t); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>READING HUB PRO</h1>
        <p style="font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 2px;">Administrator Panel</p>
    </div>

    <div id="admin" class="section active">
        <div class="card">
            <span class="form-label">Yangi o'quvchi qo'shish</span>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="newName" class="input-pill" style="margin-bottom:0;" placeholder="F.I.SH">
                <button onclick="addUser()" class="btn btn-p" style="width: 60px;"><i class="fas fa-user-plus"></i></button>
            </div>
        </div>

        <div id="quickManageList">
            </div>
        
        <button onclick="downloadData()" class="btn" style="background: #374151; color: #d1d5db; margin-top: 20px;">
            <i class="fas fa-download"></i> Hisobotni yuklash (.csv)
        </button>
    </div>

    <div id="stats" class="section">
        <div class="tabs">
            <button class="tab-btn active" onclick="filterRank('daily', this)">Kunlik</button>
            <button class="tab-btn" onclick="filterRank('weekly', this)">Haftalik</button>
            <button class="tab-btn" onclick="filterRank('monthly', this)">Oylik</button>
        </div>
        <div id="rankingList">
            </div>
    </div>

    <div id="lib" class="section">
        <div class="card">
            <div class="book-pill">
                <i class="fas fa-fire"></i>
                <div>
                    <h3 style="margin:0">Samaradorlikning 21 yo'li</h3>
                    <small style="color: #6b7280">Brian Tracy tomonidan</small>
                </div>
            </div>
            <p style="font-size: 14px; color: #9ca3af; margin-top: 15px;">
                Muvaffaqiyatga erishish uchun vaqtni to'g'ri boshqarish sirlari. Ushbu kitob orqali hayotingizni tartibga soling.
            </p>
            <button class="btn btn-p" onclick="window.open('https://t.me/kitobxonlar_klubi', '_blank')">Kitobni yuklash</button>
        </div>
    </div>
</div>

<nav class="nav">
    <div class="nav-link active" onclick="nav('admin', this)"><i class="fas fa-tasks"></i></div>
    <div class="nav-link" onclick="nav('stats', this)"><i class="fas fa-chart-line"></i></div>
    <div class="nav-link" onclick="nav('lib', this)"><i class="fas fa-book-open"></i></div>
</nav>

<script>
    // MA'LUMOTLAR BAZASI
    let db = JSON.parse(localStorage.getItem('adminReadingDB')) || [];

    // NAVIGATSIYA
    function nav(id, el) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if(id === 'admin') renderAdmin();
        if(id === 'stats') filterRank('daily');
    }

    // YANGI ODAM QO'SHISH
    function addUser() {
        const name = document.getElementById('newName').value.trim();
        if(!name) return alert("Ism kiriting!");
        
        db.push({
            id: Date.now(),
            name: name,
            logs: [], // Har bir ball qo'yilgan vaqti saqlanadi
            total: 0
        });
        save();
        document.getElementById('newName').value = '';
        renderAdmin();
    }

    // BALL BOSHQARISH (+ va -)
    function changeScore(userId, type) {
        const user = db.find(u => u.id === userId);
        const now = new Date();

        if(type === 'plus') {
            user.logs.push(now.toISOString());
            user.total++;
            confetti({ particleCount: 50, spread: 40, colors: ['#6366f1', '#ec4899'] });
        } else {
            if(user.logs.length > 0) {
                user.logs.pop();
                user.total--;
            }
        }
        save();
        renderAdmin();
    }

    // ADMIN RO'YXATINI CHIQARISH
    function renderAdmin() {
        const list = document.getElementById('quickManageList');
        list.innerHTML = '';
        db.forEach(u => {
            list.innerHTML += `
                <div class="admin-item">
                    <div class="user-meta">
                        <h4>${u.name}</h4>
                        <small>Jami: ${u.total} kun</small>
                    </div>
                    <div class="action-btns">
                        <button class="act-btn btn-minus" onclick="changeScore(${u.id}, 'minus')"><i class="fas fa-minus"></i></button>
                        <button class="act-btn btn-plus" onclick="changeScore(${u.id}, 'plus')"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            `;
        });
    }

    // REYTING FILTRI (KUNLIK, HAFTALIK, OYLIK)
    function filterRank(period, el) {
        if(el) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        const now = new Date();
        const filtered = db.map(u => {
            let pScore = u.logs.filter(log => {
                const logDate = new Date(log);
                if(period === 'daily') return logDate.toDateString() === now.toDateString();
                if(period === 'weekly') return (now - logDate) < 7 * 24 * 60 * 60 * 1000;
                if(period === 'monthly') return logDate.getMonth() === now.getMonth() && logDate.getFullYear() === now.getFullYear();
            }).length;
            return { name: u.name, score: pScore };
        }).sort((a,b) => b.score - a.score);

        const rList = document.getElementById('rankingList');
        rList.innerHTML = filtered.map((u, i) => `
            <div class="rank-row">
                <div class="rank-num">#${i+1}</div>
                <div class="rank-name">${u.name}</div>
                <div class="rank-val">${u.score}</div>
            </div>
        `).join('');
    }

    // DATA SAQLASH
    function save() { localStorage.setItem('adminReadingDB', JSON.stringify(db)); }

    // CSV YUKLAB OLISH
    function downloadData() {
        let csv = "Ism,Jami O'qilgan Kunlar\n";
        db.forEach(u => { csv += `${u.name},${u.total}\n` });
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'hisobot.csv'; a.click();
    }

    renderAdmin();
</script>
</body>
  </html>
