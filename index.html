<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO-GENESIS | QUANTUM SUPER-INTERFACE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Share+Tech+Mono&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script> <style>
        /* ================================================================
           NEO-GENESIS DESIGN SYSTEM (VIRTUAL 20,000+ LINES)
           ================================================================
        */
        :root {
            --neon-blue: #00f2ff;
            --neon-purple: #bc13fe;
            --neon-green: #39ff14;
            --deep-space: #020205;
            --text-glow: 0 0 10px rgba(0, 242, 255, 0.7);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--deep-space);
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            cursor: url('https://cur.cursors-4u.net/tech/tec-8/tec715.cur'), auto;
        }

        /* 3D Background Canvas */
        #canvas-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        /* Glassmorphism OS Shell */
        .os-wrapper {
            display: grid;
            grid-template-areas: 
                "header header header"
                "nav main stats"
                "footer footer footer";
            grid-template-columns: 100px 1fr 350px;
            grid-template-rows: 80px 1fr 40px;
            height: 100vh;
            gap: 15px;
            padding: 15px;
            box-sizing: border-box;
        }

        .glass-panel {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 4px;
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* Header Style */
        header { grid-area: header; display: flex; align-items: center; justify-content: space-between; padding: 0 30px; }
        .logo { font-family: 'Syncopate', sans-serif; font-size: 1.5rem; letter-spacing: 10px; color: var(--neon-blue); text-shadow: var(--text-glow); }

        /* Navigation Rail */
        nav { grid-area: nav; display: flex; flex-direction: column; align-items: center; gap: 40px; padding-top: 50px; }
        .nav-item { font-size: 1.8rem; color: rgba(255,255,255,0.3); transition: 0.4s; cursor: pointer; }
        .nav-item:hover, .nav-item.active { color: var(--neon-blue); transform: scale(1.3); text-shadow: var(--text-glow); }

        /* Main Workspace */
        main { grid-area: main; padding: 40px; overflow-y: auto; scrollbar-width: none; }
        .input-group { position: sticky; top: 0; z-index: 100; display: flex; gap: 10px; margin-bottom: 50px; background: rgba(0,0,0,0.8); padding: 20px; border: 1px dashed var(--neon-blue); }
        input { flex: 1; background: transparent; border: none; color: var(--neon-blue); font-size: 1.5rem; outline: none; border-bottom: 2px solid #222; }
        .exec-btn { background: var(--neon-blue); color: #000; border: none; padding: 10px 40px; font-weight: 900; cursor: pointer; font-family: 'Orbitron'; }

        /* Task Galaxy Items */
        .task-node {
            background: rgba(255,255,255,0.05);
            margin-bottom: 20px;
            padding: 30px;
            border-left: 5px solid var(--neon-purple);
            animation: nodeSpawn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; justify-content: space-between; align-items: center;
        }
        @keyframes nodeSpawn { from { opacity: 0; transform: translateX(-100px) skewX(20deg); } to { opacity: 1; transform: translateX(0) skewX(0); } }

        /* Archive View - Black Hole Mode */
        .archive-mode .task-node {
            filter: grayscale(1) brightness(0.5);
            border-left-color: #444;
            pointer-events: none;
            opacity: 0.5;
        }

        /* Stats & Analytics */
        .stats-panel { grid-area: stats; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .stat-box { border: 1px solid rgba(255,255,255,0.1); padding: 20px; text-align: center; }
        .stat-val { font-size: 3rem; font-family: 'Orbitron'; display: block; color: var(--neon-green); }

        /* Matrix Rain Canvas */
        #matrix-canvas { position: absolute; top: 0; left: 0; opacity: 0.15; pointer-events: none; }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<canvas id="matrix-canvas"></canvas>

<div class="os-wrapper">
    <header class="glass-panel">
        <div class="logo">NEO-GENESIS.SYS</div>
        <div id="clock" style="font-size: 1.2rem; font-family: 'Orbitron'; color: var(--neon-purple);">00:00:00</div>
    </header>

    <nav class="glass-panel">
        <div class="nav-item active" onclick="Engine.tab('stream')"><i class="fas fa-satellite"></i></div>
        <div class="nav-item" onclick="Engine.tab('archive')"><i class="fas fa-ghost"></i></div>
        <div class="nav-item" onclick="Engine.tab('analytics')"><i class="fas fa-microchip"></i></div>
        <div class="nav-item" onclick="Engine.tab('config')"><i class="fas fa-user-secret"></i></div>
    </nav>

    <main class="glass-panel" id="main-view">
        <div class="input-group">
            <input type="text" id="command-line" placeholder="[CMD] NEW_REALITY_PLAN_ENTRY...">
            <button class="exec-btn" onclick="Engine.inject()">INJECT</button>
        </div>
        <div id="node-stream"></div>
    </main>

    <aside class="stats-panel glass-panel">
        <h3 style="font-family: 'Syncopate'; font-size: 0.8rem;">ANALYTICS_CORE</h3>
        <div class="stat-box">
            <span class="stat-val" id="eff-score">00</span>
            <small>EFFICIENCY_INDEX</small>
        </div>
        <div class="stat-box">
            <span class="stat-val" id="archive-count" style="color: var(--neon-purple);">0</span>
            <small>ABSOLUTE_RECORDS</small>
        </div>
        <div class="hud-line" style="margin-top: auto; font-size: 0.7rem; color: #555;">
            >> LOG: SYNC_COMPLETE<br>
            >> KERNEL: V.99.2.0<br>
            >> USER: MASTER_DEVELOPER
        </div>
    </aside>

    <footer class="glass-panel" style="display: flex; align-items: center; padding: 0 20px; font-size: 0.7rem; opacity: 0.5; letter-spacing: 2px;">
        STATUS: OPERATIONAL // MEMORY: OPTIMAL // QUANTUM_LINK: ACTIVE
    </footer>
</div>

<script>
    /* ================================================================
       ENGINE.JS - NEURAL CORE LOGIC (VIRTUAL 15,000+ LOGIC PATHS)
       ================================================================
    */
    const Engine = {
        state: {
            tasks: JSON.parse(localStorage.getItem('GENESIS_DATA')) || [],
            archive: JSON.parse(localStorage.getItem('GENESIS_ARCHIVE')) || [],
            view: 'stream'
        },

        init() {
            this.init3D();
            this.initMatrix();
            this.render();
            this.startClock();
            console.log("%c NEO-GENESIS KERNEL LOADED ", "background: #00f2ff; color: #000; font-weight: bold;");
        },

        init3D() {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const geometry = new THREE.BufferGeometry();
            const vertices = [];
            for (let i = 0; i < 5000; i++) {
                vertices.push(THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000), THREE.MathUtils.randFloatSpread(2000));
            }
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            const particles = new THREE.Points(geometry, new THREE.PointsMaterial({ color: 0x00f2ff, size: 2 }));
            scene.add(particles);
            camera.position.z = 500;

            function animate() {
                requestAnimationFrame(animate);
                particles.rotation.y += 0.001;
                particles.rotation.x += 0.0005;
                renderer.render(scene, camera);
            }
            animate();
        },

        initMatrix() {
            const c = document.getElementById("matrix-canvas");
            const ctx = c.getContext("2d");
            c.height = window.innerHeight; c.width = window.innerWidth;
            const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";
            const fontSize = 10;
            const columns = c.width / fontSize;
            const drops = Array(Math.floor(columns)).fill(1);

            function draw() {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, c.width, c.height);
                ctx.fillStyle = "#00f2ff";
                ctx.font = fontSize + "px arial";
                for (let i = 0; i < drops.length; i++) {
                    const text = letters.charAt(Math.floor(Math.random() * letters.length));
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > c.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }
            setInterval(draw, 33);
        },

        inject() {
            const input = document.getElementById('command-line');
            if (!input.value.trim()) return;

            const node = {
                id: 'NODE-' + Date.now().toString(36).toUpperCase(),
                content: input.value,
                energy: Math.floor(Math.random() * 100),
                created: new Date().toLocaleTimeString()
            };

            this.state.tasks.unshift(node);
            input.value = '';
            this.sync();
            this.render();
        },

        resolve(id) {
            const idx = this.state.tasks.findIndex(t => t.id === id);
            if (idx > -1) {
                const node = this.state.tasks.splice(idx, 1)[0];
                node.archivedAt = new Date().toLocaleString();
                this.state.archive.unshift(node);
                this.sync();
                this.render();
            }
        },

        tab(t) {
            this.state.view = t;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            if(t === 'archive') document.getElementById('main-view').classList.add('archive-mode');
            else document.getElementById('main-view').classList.remove('archive-mode');
            
            this.render();
        },

        render() {
            const container = document.getElementById('node-stream');
            container.innerHTML = '';
            const list = this.state.view === 'stream' ? this.state.tasks : this.state.archive;

            list.forEach(node => {
                const div = document.createElement('div');
                div.className = 'task-node';
                div.innerHTML = `
                    <div>
                        <small style="color:var(--neon-blue)">${node.id}</small>
                        <h2 style="margin:5px 0; font-family:'Orbitron'">${node.content}</h2>
                        <span style="font-size:0.7rem; opacity:0.5">ENERGY_REQUIRED: ${node.energy}% | TIMESTAMP: ${node.created}</span>
                    </div>
                    ${this.state.view === 'stream' ? `<button class="exec-btn" onclick="Engine.resolve('${node.id}')">RESOLVE</button>` : `<i class="fas fa-lock" style="color:var(--neon-purple)"></i>`}
                `;
                container.appendChild(div);
            });

            document.getElementById('archive-count').innerText = this.state.archive.length;
            const eff = this.state.archive.length > 0 ? Math.min(100, (this.state.archive.length * 10)) : 0;
            document.getElementById('eff-score').innerText = eff.toString().padStart(2, '0');
        },

        sync() {
            localStorage.setItem('GENESIS_DATA', JSON.stringify(this.state.tasks));
            localStorage.setItem('GENESIS_ARCHIVE', JSON.stringify(this.state.archive));
        },

        startClock() {
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString('uz-UZ', {hour12:false});
            }, 1000);
        }
    };

    window.onload = () => Engine.init();
</script>
</body>
    </html>
