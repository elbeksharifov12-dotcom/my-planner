<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTasker - Mukammal Rejalashtirish Tizimi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --accent-color: #00cec9;
            --bg-gradient: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        /* Glassmorphism Effect */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* Header Styles */
        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .date-display {
            font-size: 1.1rem;
            opacity: 0.8;
        }

        /* Main Content - Task Section */
        .task-section h2 {
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            padding: 15px 20px;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-add {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-add:hover {
            background: var(--secondary-color);
            transform: translateY(-2px);
        }

        /* Task List Styles */
        .task-list {
            list-style: none;
        }

        .task-item {
            background: rgba(255, 255, 255, 0.05);
            margin-bottom: 15px;
            padding: 15px 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
            border-left: 5px solid var(--primary-color);
            animation: slideIn 0.4s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .task-item.completed {
            border-left-color: var(--accent-color);
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
        }

        .task-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .checkbox-custom {
            width: 22px;
            height: 22px;
            border: 2px solid var(--accent-color);
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .task-item.completed .checkbox-custom {
            background: var(--accent-color);
        }

        .task-actions {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            background: none;
            border: none;
            color: #ff7675;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.2s;
        }

        .btn-action:hover {
            transform: scale(1.2);
        }

        /* Sidebar - Stats Section */
        .stats-section {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .stat-card {
            text-align: center;
        }

        .circle-progress {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 20px auto;
        }

        .circle-progress svg {
            width: 150px;
            height: 150px;
            transform: rotate(-90deg);
        }

        .circle-progress circle {
            fill: none;
            stroke-width: 10;
            stroke-linecap: round;
        }

        .circle-bg {
            stroke: rgba(255, 255, 255, 0.1);
        }

        .circle-value {
            stroke: var(--accent-color);
            stroke-dasharray: 440;
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 1s ease-in-out;
        }

        .percentage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            font-weight: 700;
        }

        .stat-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 10px;
        }

        .mini-stat {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
        }

        .mini-stat h4 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
            color: var(--secondary-color);
        }

        .mini-stat span {
            font-size: 1.2rem;
            font-weight: 700;
        }

        /* Motivational Quote */
        .quote-box {
            margin-top: auto;
            font-style: italic;
            font-size: 0.9rem;
            text-align: center;
            opacity: 0.7;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
            .stats-section {
                order: -1;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header glass-panel">
        <div>
            <h1 id="greeting">Xayrli tong!</h1>
            <p class="date-display" id="currentDate">7-Aprel, 2026</p>
        </div>
        <div class="user-profile">
            <i class="fas fa-user-circle fa-3x"></i>
        </div>
    </header>

    <main class="task-section glass-panel">
        <h2><i class="fas fa-tasks"></i> Kunlik Rejalar</h2>
        
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="Yangi vazifa qo'shing (masalan: Kitob o'qish)...">
            <button class="btn-add" onclick="addTask()">
                <i class="fas fa-plus"></i> Qo'shish
            </button>
        </div>

        <ul class="task-list" id="taskList">
            </ul>
    </main>

    <aside class="stats-section">
        <div class="glass-panel stat-card">
            <h3>Kunlik Progress</h3>
            <div class="circle-progress">
                <svg>
                    <circle class="circle-bg" cx="75" cy="75" r="70"></circle>
                    <circle class="circle-value" id="progressCircle" cx="75" cy="75" r="70"></circle>
                </svg>
                <div class="percentage" id="progressText">0%</div>
            </div>
            <p id="statusMsg">Hali hech narsa bajarilmadi</p>
        </div>

        <div class="glass-panel">
            <h3>Umumiy Statistika</h3>
            <div class="stat-details">
                <div class="mini-stat">
                    <h4>Haftalik</h4>
                    <span id="weeklyStat">84%</span>
                </div>
                <div class="mini-stat">
                    <h4>Oylik</h4>
                    <span id="monthlyStat">72%</span>
                </div>
            </div>
        </div>

        <div class="glass-panel quote-box">
            <p id="quote">"Muvaffaqiyat — bu har kuni takrorlanadigan kichik g'alabalar yig'indisidir."</p>
        </div>
    </aside>
</div>

<script>
    // Ma'lumotlarni saqlash uchun massiv
    let tasks = JSON.parse(localStorage.getItem('myTasks')) || [];

    // Vaqt va Salomlashish
    function updateHeader() {
        const now = new Date();
        const hour = now.getHours();
        const greeting = document.getElementById('greeting');
        const dateDisplay = document.getElementById('currentDate');

        if(hour < 12) greeting.innerText = "Xayrli tong!";
        else if(hour < 18) greeting.innerText = "Xayrli kun!";
        else greeting.innerText = "Xayrli kecha!";

        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        dateDisplay.innerText = now.toLocaleDateString('uz-UZ', options);
    }

    // Vazifa qo'shish
    function addTask() {
        const input = document.getElementById('taskInput');
        const text = input.value.trim();

        if (text) {
            const newTask = {
                id: Date.now(),
                text: text,
                completed: false,
                date: new Date().toLocaleDateString()
            };
            tasks.push(newTask);
            saveAndRender();
            input.value = '';
        }
    }

    // O'chirish
    function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        saveAndRender();
    }

    // Bajarilganlikni belgilash
    function toggleTask(id) {
        tasks = tasks.map(t => {
            if (t.id === id) return { ...t, completed: !t.completed };
            return t;
        });
        saveAndRender();
    }

    // Ma'lumotlarni saqlash va ko'rsatish
    function saveAndRender() {
        localStorage.setItem('myTasks', JSON.stringify(tasks));
        renderTasks();
        updateStats();
    }

    function renderTasks() {
        const list = document.getElementById('taskList');
        list.innerHTML = '';

        tasks.forEach(task => {
            const li = document.createElement('li');
            li.className = `task-item ${task.completed ? 'completed' : ''}`;
            li.innerHTML = `
                <div class="task-content">
                    <div class="checkbox-custom" onclick="toggleTask(${task.id})">
                        ${task.completed ? '<i class="fas fa-check"></i>' : ''}
                    </div>
                    <span class="task-text">${task.text}</span>
                </div>
                <div class="task-actions">
                    <button class="btn-action" onclick="deleteTask(${task.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `;
            list.appendChild(li);
        });
    }

    // Statistika hisoblash
    function updateStats() {
        const total = tasks.length;
        const completed = tasks.filter(t => t.completed).length;
        const percent = total === 0 ? 0 : Math.round((completed / total) * 100);

        // Progress Circle Update
        const circle = document.getElementById('progressCircle');
        const text = document.getElementById('progressText');
        const offset = 440 - (440 * percent) / 100;
        circle.style.strokeDashoffset = offset;
        text.innerText = percent + "%";

        // Status xabari
        const msg = document.getElementById('statusMsg');
        if (percent === 100 && total > 0) msg.innerText = "Bugungi barcha vazifalar bajarildi! 🔥";
        else if (percent > 50) msg.innerText = "Yaxshi ketyapsiz, davom eting! 💪";
        else if (total > 0) msg.innerText = "Hali vazifalar kutib turibdi...";
        else msg.innerText = "Bugun rejalar yo'q...";

        // Sun'iy Haftalik va Oylik (Dinamik qilish mumkin)
        document.getElementById('weeklyStat').innerText = (percent > 0 ? Math.min(percent + 15, 95) : 45) + "%";
        document.getElementById('monthlyStat').innerText = (percent > 0 ? Math.min(percent + 5, 88) : 60) + "%";
    }

    // Inputda Enter tugmasini bosganda qo'shish
    document.getElementById('taskInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') addTask();
    });

    // Sayt yuklanganda
    window.onload = () => {
        updateHeader();
        saveAndRender();
        
        // Tasodifiy motivatsiya
        const quotes = [
            "\"Muvaffaqiyat — bu har kuni takrorlanadigan kichik g'alabalar yig'indisidir.\"",
            "\"Bugungi harakat — ertangi natija.\"",
            "\"Vaqtingizni boshqaring, aks holda u sizni boshqaradi.\"",
            "\"Kichik qadamlar katta maqsadlarga olib boradi.\""
        ];
        document.getElementById('quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];
    };
</script>

</body>
    </html>
