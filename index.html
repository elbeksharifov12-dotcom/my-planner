<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Pro Planner v2.0 | Arxiv & Statistika</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* PREMIUM CSS ARCHITECTURE 
           Ushbu qismda barcha dizayn elementlari joylashgan.
        */
        :root {
            --bg-dark: #0a0b10;
            --card-bg: rgba(23, 25, 35, 0.8);
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --accent: #ff007a;
            --text-main: #e0e0e0;
            --text-dim: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.1);
            --success: #00ff88;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #1a1a2e, #0a0b10);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 50px;
        }

        /* Murakkab Orqa Fon Animatsiyasi */
        .bg-blobs {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.4;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            background: var(--primary);
            animation: move 20s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100vw, 100vh); }
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            gap: 25px;
        }

        /* Glassmorphism Panellar */
        .glass {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* Sidebar Navigatsiya */
        .sidebar h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--primary);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            color: var(--text-dim);
        }
        .nav-item:hover, .nav-item.active {
            background: rgba(0, 210, 255, 0.1);
            color: var(--primary);
            transform: translateX(10px);
        }

        /* Markaziy qism: Planner */
        .main-content header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
        }

        .main-content h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-box {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 18px 25px;
            border-radius: 15px;
            color: #fff;
            font-size: 1rem;
            outline: none;
        }
        .add-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            padding: 0 30px;
            border-radius: 15px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: 0.4s;
        }
        .add-btn:hover {
            box-shadow: 0 0 20px var(--primary);
            transform: scale(1.05);
        }

        /* Vazifalar ro'yxati */
        .task-card {
            background: rgba(255,255,255,0.03);
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--primary);
            transition: 0.3s;
        }
        .task-card.done {
            border-left-color: var(--success);
            opacity: 0.7;
        }
        .task-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .check-circle {
            width: 25px; height: 25px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            cursor: pointer;
            display: grid;
            place-items: center;
        }
        .done .check-circle {
            background: var(--success);
            border-color: var(--success);
        }

        /* Arxiv qismi uchun maxsus dizayn */
        .archive-mode .task-card {
            border-left-color: #555;
            cursor: not-allowed;
            pointer-events: none; /* Hech narsani o'zgartirib bo'lmaydi */
        }
        .archive-tag {
            font-size: 0.7rem;
            background: rgba(255,255,255,0.1);
            padding: 4px 10px;
            border-radius: 5px;
            color: var(--text-dim);
        }

        /* Sidebar Stats */
        .stat-box {
            text-align: center;
            margin-bottom: 20px;
        }
        .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--primary);
            display: block;
        }
        .stat-label {
            color: var(--text-dim);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 1100px) {
            .container { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob" style="width: 400px; height: 400px; left: -100px; top: -100px;"></div>
        <div class="blob" style="width: 300px; height: 300px; right: -50px; bottom: -50px; background: var(--accent);"></div>
    </div>

    <div class="container">
        <aside class="sidebar glass">
            <h2>PRO DASHBOARD</h2>
            <div class="nav-item active" onclick="switchTab('daily')">
                <i class="fas fa-calendar-day"></i>
                <span>Kunlik Rejalar</span>
            </div>
            <div class="nav-item" onclick="switchTab('archive')">
                <i class="fas fa-archive"></i>
                <span>Arxiv (O'zgarmas)</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-chart-line"></i>
                <span>Statistika</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-cog"></i>
                <span>Sozlamalar</span>
            </div>
            
            <div style="margin-top: 50px;">
                <p class="stat-label">Haftalik Progress</p>
                <div style="width: 100%; height: 8px; background: #222; border-radius: 10px; margin-top: 10px;">
                    <div id="weeklyProgress" style="width: 65%; height: 100%; background: var(--primary); border-radius: 10px; box-shadow: 0 0 10px var(--primary);"></div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <div>
                    <p id="currentDay">Seshanba</p>
                    <h1 id="titleText">Daily Planner</h1>
                </div>
                <div class="glass" style="padding: 10px 20px; border-radius: 15px;">
                    <span id="digitalClock" style="font-family: 'Orbitron'; font-weight: bold;">09:41</span>
                </div>
            </header>

            <div id="inputSection">
                <div class="input-box">
                    <input type="text" id="mainInput" placeholder="Nima rejangiz bor?">
                    <button class="add-btn" onclick="addNewTask()">ADD TASK</button>
                </div>
            </div>

            <div id="taskList">
                </div>
        </main>

        <aside class="right-sidebar">
            <div class="glass" style="margin-bottom: 25px;">
                <div class="stat-box">
                    <span class="stat-label">Bajarilgan</span>
                    <span class="stat-value" id="doneCount">0</span>
                </div>
                <hr style="border: 0; border-top: 1px solid var(--glass-border); margin: 20px 0;">
                <div class="stat-box">
                    <span class="stat-label">Umumiy samaradorlik</span>
                    <span class="stat-value" id="effPercent">0%</span>
                </div>
            </div>

            <div class="glass">
                <h3 style="font-size: 0.9rem; margin-bottom: 15px;">KUNLIK MOTIVATSIYA</h3>
                <p id="quoteBox" style="font-size: 0.85rem; color: var(--text-dim); line-height: 1.6;">
                    "Sizning bugungi mehnatingiz ertangi hayotingiz poydevoridir."
                </p>
            </div>
        </aside>
    </div>

    <script>
        /* CORE JAVASCRIPT LOGIC 
           Barcha funksiyalar va ma'lumotlar boshqaruvi.
        */

        let state = {
            view: 'daily', // daily yoki archive
            dailyTasks: JSON.parse(localStorage.getItem('dailyTasks')) || [],
            archivedTasks: JSON.parse(localStorage.getItem('archivedTasks')) || []
        };

        // SAQLASH
        function syncStorage() {
            localStorage.setItem('dailyTasks', JSON.stringify(state.dailyTasks));
            localStorage.setItem('archivedTasks', JSON.stringify(state.archivedTasks));
            updateStats();
        }

        // YANGI VAZIFA
        function addNewTask() {
            const input = document.getElementById('mainInput');
            if (input.value.trim() === "") return;

            const task = {
                id: Date.now(),
                text: input.value,
                completed: false,
                time: new Date().toLocaleTimeString().slice(0, 5),
                date: new Date().toLocaleDateString()
            };

            state.dailyTasks.unshift(task);
            input.value = "";
            render();
            syncStorage();
        }

        // BAJARILDI DEB BELGILASH VA ARXIVGA YUBORISH
        function toggleTask(id) {
            state.dailyTasks = state.dailyTasks.map(t => {
                if (t.id === id) {
                    t.completed = !t.completed;
                    // Agar bajarilgan bo'lsa, 1 soniyadan keyin arxivga o'tkazish
                    if(t.completed) {
                        setTimeout(() => moveToArchive(id), 1000);
                    }
                }
                return t;
            });
            render();
            syncStorage();
        }

        function moveToArchive(id) {
            const taskIndex = state.dailyTasks.findIndex(t => t.id === id);
            if(taskIndex > -1) {
                const task = state.dailyTasks.splice(taskIndex, 1)[0];
                task.archivedAt = new Date().toLocaleDateString();
                state.archivedTasks.unshift(task);
                render();
                syncStorage();
            }
        }

        // TABLARNI ALMASHTIRISH
        function switchTab(tab) {
            state.view = tab;
            
            // UI Update
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            const inputSection = document.getElementById('inputSection');
            const title = document.getElementById('titleText');

            if(tab === 'archive') {
                inputSection.style.display = 'none';
                title.innerText = "Archive (View Only)";
                document.getElementById('taskList').classList.add('archive-mode');
            } else {
                inputSection.style.display = 'flex';
                title.innerText = "Daily Planner";
                document.getElementById('taskList').classList.remove('archive-mode');
            }
            render();
        }

        // RENDER QILISH
        function render() {
            const list = document.getElementById('taskList');
            list.innerHTML = "";
            
            const tasksToDisplay = state.view === 'daily' ? state.dailyTasks : state.archivedTasks;

            if(tasksToDisplay.length === 0) {
                list.innerHTML = `<p style="text-align: center; color: var(--text-dim); margin-top: 50px;">Hech narsa topilmadi...</p>`;
                return;
            }

            tasksToDisplay.forEach(task => {
                const card = document.createElement('div');
                card.className = `task-card ${task.completed ? 'done' : ''}`;
                card.innerHTML = `
                    <div class="task-info">
                        <div class="check-circle" onclick="toggleTask(${task.id})">
                            ${task.completed ? '<i class="fas fa-check"></i>' : ''}
                        </div>
                        <div>
                            <p style="font-weight: 600;">${task.text}</p>
                            <span style="font-size: 0.7rem; color: var(--text-dim);">
                                <i class="far fa-clock"></i> ${task.time} 
                                ${state.view === 'archive' ? `<span class="archive-tag">Arxivlandi: ${task.archivedAt}</span>` : ''}
                            </span>
                        </div>
                    </div>
                    ${state.view === 'daily' ? `
                        <i class="fas fa-trash" style="color: #ff4757; cursor: pointer;" onclick="deleteTask(${task.id})"></i>
                    ` : '<i class="fas fa-lock" title="Arxivlangan, o\'zgartirib bo\'lmaydi"></i>'}
                `;
                list.appendChild(card);
            });
        }

        function deleteTask(id) {
            state.dailyTasks = state.dailyTasks.filter(t => t.id !== id);
            render();
            syncStorage();
        }

        function updateStats() {
            const done = state.archivedTasks.length;
            const daily = state.dailyTasks.length;
            const total = done + daily;
            
            document.getElementById('doneCount').innerText = done;
            const percent = total === 0 ? 0 : Math.round((done / total) * 100);
            document.getElementById('effPercent').innerText = percent + "%";
            document.getElementById('weeklyProgress').style.width = percent + "%";
        }

        // VAQT VA SOAT
        setInterval(() => {
            const now = new Date();
            document.getElementById('digitalClock').innerText = now.toLocaleTimeString().slice(0, 5);
        }, 1000);

        // INITIALIZE
        window.onload = () => {
            const days = ["Yakshanba", "Dushanba", "Seshanba", "Chorshanba", "Payshanba", "Juma", "Shanba"];
            document.getElementById('currentDay').innerText = days[new Date().getDay()];
            render();
            updateStats();
        };
    </script>
</body>
    </html>
